services:
  postgres:
    image: postgres:16
    container_name: codeatlas_postgres
    environment:
      POSTGRES_USER: codeatlas
      POSTGRES_PASSWORD: dev_password
      POSTGRES_DB: codeatlas_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codeatlas -d codeatlas_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - codeatlas_network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: codeatlas_qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - codeatlas_network

  backend:
    build: ./backend
    container_name: codeatlas_backend
    ports:
      - "8000:8000"
    # Load secrets from backend/.env, then override Docker-specific network URLs
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://codeatlas:dev_password@postgres:5432/codeatlas_dev
      QDRANT_URL: http://qdrant:6333
      FRONTEND_URL: http://localhost:3000
      LOG_LEVEL: INFO
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    networks:
      - codeatlas_network


volumes:
  postgres_data:
  qdrant_data:

networks:
  codeatlas_network:
    driver: bridge
