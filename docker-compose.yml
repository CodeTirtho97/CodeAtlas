version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: codeatlas_postgres
    environment:
      POSTGRES_USER: codeatlas
      POSTGRES_PASSWORD: dev_password
      POSTGRES_DB: codeatlas_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codeatlas"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - codeatlas_network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: codeatlas_qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT_API_KEY: ""
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - codeatlas_network

  backend:
    build: ./backend
    container_name: codeatlas_backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://codeatlas:dev_password@postgres:5432/codeatlas_dev
      QDRANT_URL: http://qdrant:6333
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-your_google_api_key}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-your_github_client_id}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-your_github_client_secret}
      JWT_SECRET: ${JWT_SECRET:-dev_secret_key_change_in_prod_1234567890}
      FRONTEND_URL: http://localhost:3000
      LOG_LEVEL: INFO
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    networks:
      - codeatlas_network

  frontend:
    build: ./frontend
    container_name: codeatlas_frontend
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-your_github_client_id}
    depends_on:
      - backend
    command: npm run dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - codeatlas_network

volumes:
  postgres_data:
  qdrant_data:

networks:
  codeatlas_network:
    driver: bridge
